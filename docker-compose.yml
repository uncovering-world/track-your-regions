services:
  db:
    image: postgis/postgis:17-3.5-alpine  # Alpine has GEOS 3.12+; Debian has 3.9 which lacks ST_CoverageSimplify
    container_name: ${STACK_NAME:-tyr-ng}-db
    environment:
      POSTGRES_DB: ${DB_NAME:-track_regions}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro,z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-track_regions}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${STACK_NAME:-tyr-ng}-backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-track_regions}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      NODE_ENV: ${NODE_ENV:-development}
      CV_PYTHON_URL: http://cv-python:8000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Authentication
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # Apple Sign-In (TODO: untested, requires Apple Developer account)
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_KEY_ID: ${APPLE_KEY_ID:-}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY:-}
      # Email (SMTP) — optional in dev, falls back to console logging
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@localhost}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      BIND_ADDR: 0.0.0.0
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3001}:3001"
    volumes:
      - ./backend/src:/app/src:ro,z
      - ./data:/app/data:z
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${STACK_NAME:-tyr-ng}-frontend
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-3001}
      VITE_MARTIN_URL: http://localhost:${MARTIN_PORT:-3000}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend/src:/app/src:ro,z
      - ./frontend/index.html:/app/index.html:ro,z
    depends_on:
      - backend
    command: npm run dev -- --host

  # Martin Vector Tile Server
  # Serves MVT tiles directly from PostGIS for fast map rendering
  martin:
    image: ghcr.io/maplibre/martin:v0.14.2
    container_name: ${STACK_NAME:-tyr-ng}-martin
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-track_regions}
    ports:
      - "${MARTIN_PORT:-3000}:3000"
    volumes:
      - ./martin/config.yaml:/config.yaml:ro,z
    depends_on:
      db:
        condition: service_healthy
    command: ["--config", "/config.yaml"]
    restart: unless-stopped

  cv-python:
    build:
      context: ./cv-python
      dockerfile: Dockerfile
    container_name: ${STACK_NAME:-tyr-ng}-cv-python
    # No host port mapping — service is reachable only on the internal Docker
    # network at http://cv-python:8000. The CV pipeline endpoints (`/pipeline/*`
    # added in rebuild/41-43) accept operator decisions for in-progress reviews
    # and would bypass the Node.js auth layer if exposed on the host. For
    # ad-hoc dev access, add a `ports:` block in `docker-compose.override.yml`.
    expose:
      - "8000"
    volumes:
      - ./cv-python/app:/app/app:ro,z
      - ./data:/app/data:z
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # One-off GADM loader (GDAL + psycopg2 + dotenv + shapely). Not started by
  # `docker compose up` (tools profile); invoked by `npm run db:load-gadm` via
  # `docker compose run --rm db-loader ...`, so the host needs no Python/GDAL.
  db-loader:
    build:
      context: ./db
      dockerfile: Dockerfile
    image: ${STACK_NAME:-tyr-ng}-db-loader
    profiles: ["tools"]
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-track_regions}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - ./db:/app/db:ro,z
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
