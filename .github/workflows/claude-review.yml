name: Claude PR Review

# Aligned with anthropics/claude-code-action canonical patterns:
#   docs/solutions.md > "Automatic PR Code Review"  — basic structure
#   docs/solutions.md > "Custom PR Review Checklist" — per-team criteria
#   docs/solutions.md > "Tips for All Solutions"    — REPO/PR NUMBER context, tool perms
#   docs/configuration.md > "Custom Tools"          — Bash whitelist required for gh CLI
#   docs/usage.md inputs table                       — claude_code_oauth_token for OAuth
# Auth: Pro/Max subscription via CLAUDE_CODE_OAUTH_TOKEN.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  # Required for Claude to read CI results on PRs (docs/security.md).
  actions: read

jobs:
  review:
    # Auto-runs on every PR open/sync EXCEPT Dependabot —
    # claude-dependabot.yml owns those (different prompt focused on
    # version-bump risk + codebase impact). Comment-based @claude
    # interactions are handled separately by claude-qa.yml (tag mode).
    # Action enforces "users with write access only" internally
    # (docs/security.md), and GitHub strips secrets for fork PRs.
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Action runs `git fetch origin main --depth=1` internally to restore
          # trusted base-branch config (CLAUDE.md, .claude/, etc.). Shallow OK.
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Visible progress — posts a "Claude is reviewing..." tracking
          # comment that updates with checkboxes and finalizes to "Completed".
          # See docs/solutions.md "Enhanced Example (With Progress Tracking)".
          track_progress: true

          # Default ('true') buffers any inline comment without
          # `confirmed: true` and classifies it post-session via Haiku
          # ("real review vs test/probe"). Setting 'false' makes ALL
          # inline comments post immediately, regardless of `confirmed` —
          # simpler, and removes a silent-drop failure mode for legit
          # findings. Subagent-test-comment risk is low for this
          # review-only flow.
          # See docs/usage.md inputs table for `classify_inline_comments`.
          classify_inline_comments: false

          # Self-contained prompt — no external doc references that would
          # cost turns to read. Project conventions (CLAUDE.md, etc.) are
          # auto-loaded into Claude Code's system context by the action.
          #
          # Output rules below are mandatory: per docs/capabilities-and-
          # limitations.md, Claude can only update ONE top-level comment.
          # The only way to surface multiple findings is via the inline-
          # comment MCP tool — so direct, line-level findings MUST go inline.
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing this PR. Project conventions live in CLAUDE.md
            (already in your context). The structure below mirrors
            anthropics/claude-code-security-review's prompt design — phased
            methodology, generic categories, confidence-based filter.

            ## CRITICAL INSTRUCTIONS

            1. **Confidence-based filter.** Only flag findings you'd defend
               in a real PR review. Skip speculative ("could be"),
               theoretical, or low-impact findings. If you can't name the
               specific control-flow path that's broken or the specific
               contract that's violated, you're guessing — trace harder or
               skip.
            2. **Avoid noise.** Skip stylistic preferences, defensive-code
               wishes where internal guarantees exist, reformatting wishes.
            3. **Verify before flagging.** When tempted to flag "X is
               missing", check upstream (middleware, wrappers, project
               conventions in CLAUDE.md / dev-guide) and downstream (is the
               supposed gap actually reachable?). If verification shows it's
               handled elsewhere — Zod `validate()` at the route layer,
               `requireAuth` middleware, generic error handler — DON'T flag.
               False positives waste reviewer attention.
            4. **Pre-existing ≠ skip.** Latent bugs in moved/refactored code
               STILL get flagged with a `[pre-existing]` prefix. Refactoring
               is the natural moment to surface latent issues.
            5. **Calibrate severity.** Critical / Major / Minor / Note based
               on blast radius, exploitability, recoverability — NOT on
               visual prominence.

            ## ANALYSIS METHODOLOGY (phases)

            **Phase 1 — Context.** Read CLAUDE.md and any relevant
            `docs/tech/*` doc for the area touched by this PR. Note the
            project's patterns and conventions for this domain.

            **Phase 2 — Diff.** Get the diff with `gh pr diff`. Identify
            what changed: pure move vs new behavior vs deletion.

            **Phase 3 — Trace.** For each non-trivial change, MENTALLY
            EXECUTE the code paths — happy path, early returns, error
            paths, edge conditions. Don't assume a familiar pattern
            (try/finally, async/await, transactions, locks) is implemented
            correctly because the shape is correct. Each control-flow exit
            must satisfy the required contract (commit/rollback, release,
            close, unlock, cleanup). Verify, don't pattern-match.

            **Phase 4 — Verify.** For each candidate finding, run the
            CRITICAL INSTRUCTION #3 check (upstream/downstream) before
            posting. Drop verified-handled candidates.

            ## CATEGORIES (general — not exhaustive, not bug-specific)

            - **Security** — OWASP ASVS 5.0 L2: input handling at trust
              boundaries, authn/authz on endpoints, parameterized queries,
              secret handling, access control (IDOR), injection vectors
            - **Correctness** — logic errors, missing edge cases, control-flow
              exits that skip required cleanup, error-path correctness,
              concurrent state handling
            - **Refactoring hygiene** — dead code left behind, unused imports,
              redundant guards, leftover commented code
            - **Convention adherence** — code reuse (shared components/utils),
              file-size limits, dev-guide patterns, commit hygiene

            ## EXCLUSIONS (don't report)

            - Style preferences without correctness impact
            - "Could be more readable" without naming a specific contract
              violated
            - Defensive code suggestions where internal guarantees exist
            - Theoretical issues with no plausible exploitation/failure path

            ## OUTPUT RULES (mandatory)

            For EVERY specific line-level finding, you MUST post an inline comment
            via `mcp__github_inline_comment__create_inline_comment` with:
              - the exact `path` and `line` of the issue
              - one or two sentences naming the issue and suggesting a fix

            Reserve the top-level comment (`gh pr comment`) for the OVERALL summary only:
              - 1–2 sentence verdict (e.g. "Clean. No issues." / "3 inline findings flagged.")
              - Optional: 1-line per category mentioning how many issues / where
              - DO NOT repeat the inline issues in the top-level — that defeats the inline mechanism

            If you find NO line-level issues, post just the top-level summary.

            Workflow:
            1. Get the diff: `gh pr diff`
            2. For each specific line-level concern → inline comment
            3. Once all inline comments are posted → ONE top-level summary via `gh pr comment`
            4. **Re-run only**: if there are existing UNRESOLVED claude[bot] inline review threads on this PR (use `gh api graphql` with the `reviewThreads` query), check whether the diff at the thread's path/line still contains the issue you previously flagged. For each thread whose concern is now addressed, resolve it via the GraphQL `resolveReviewThread` mutation. Skip threads where the original concern still applies — leave those open. Skip threads from other authors (CodeQL, CodeRabbit, humans) — only resolve your own.

            Other rules:
            - Only post GitHub comments — don't submit review text as chat messages.
            - Be terse. Actionable findings only, no narration of what the PR does.
            - On a clean re-review (everything resolved + no new findings), the top-level summary should explicitly mention how many threads you resolved (e.g. "Resolved 3 prior findings; no new issues.").

          claude_args: |
            --model claude-sonnet-4-6
            --effort xhigh
            --max-turns 50
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api graphql:*)"
