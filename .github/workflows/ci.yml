name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Lint
        run: |
          npm --prefix backend run lint
          npm --prefix frontend run lint

      - name: Type Check
        run: |
          npm --prefix backend run typecheck
          npm --prefix frontend run typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run backend tests
        run: npx vitest run
        working-directory: backend

      - name: Run frontend tests
        run: npx vitest run
        working-directory: frontend

  python-checks:
    name: Python Lint, Type, Test (cv-python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            cv-python/requirements.txt
            cv-python/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r cv-python/requirements.txt -r cv-python/requirements-dev.txt

      - name: Ruff lint
        run: ruff check .
        working-directory: cv-python

      - name: Ruff format check
        run: ruff format --check .
        working-directory: cv-python

      - name: mypy
        run: mypy app
        working-directory: cv-python

      - name: Bandit (Python SAST)
        run: bandit -r app -c pyproject.toml
        working-directory: cv-python

      - name: pytest
        run: pytest
        working-directory: cv-python

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build backend
        run: npm --prefix backend run build

      - name: Build frontend
        run: npm --prefix frontend run build

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: cv-python/requirements.txt

      - name: Semgrep SAST (Node)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/nodejs
            p/react
            p/secrets

      - name: Semgrep SAST (Python)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/owasp-top-ten
            p/secrets

      - name: npm audit (backend)
        run: npm audit --prefix backend --audit-level=moderate --omit=dev

      - name: npm audit (frontend)
        run: npm audit --prefix frontend --audit-level=moderate --omit=dev
        continue-on-error: true

      - name: pip-audit (cv-python)
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit -r cv-python/requirements.txt

  trivy-image:
    name: Trivy Image Scan (cv-python)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Build cv-python image
        run: docker build -t track-your-regions/cv-python:scan ./cv-python

      - name: Trivy scan (HIGH, CRITICAL)
        # Pinned to v0.36.0 commit SHA per GitHub Actions secure-use guidance
        # (avoid mutable @master / @v0.36.0 tag refs that can be repointed).
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: track-your-regions/cv-python:scan
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
