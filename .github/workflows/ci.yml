name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check:
    # Job display name kept as "Lint & Type Check" so existing branch-protection
    # required-check rules continue to match. The job's actual scope is the
    # full `npm run check` gate (lint + typecheck + knip + audits, both stacks).
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            cv-python/requirements.txt
            cv-python/requirements-dev.txt

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Set up cv-python venv
        run: npm run setup:py:dev

      - name: Run check (Node + Python lint, typecheck, knip, audits)
        run: npm run check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run backend tests
        run: npx vitest run
        working-directory: backend

      - name: Run frontend tests
        run: npx vitest run
        working-directory: frontend

  python-tests:
    name: Python Tests (cv-python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            cv-python/requirements.txt
            cv-python/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r cv-python/requirements.txt -r cv-python/requirements-dev.txt

      - name: pytest
        run: pytest
        working-directory: cv-python

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build backend
        run: npm --prefix backend run build

      - name: Build frontend
        run: npm --prefix frontend run build

  security:
    # Kept as "Security Scan" so existing branch-protection required-check
    # rules match. Slow Semgrep SAST only — fast audits (npm audit, pip-audit,
    # Bandit) moved into `npm run check`.
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep SAST (Node)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/nodejs
            p/react
            p/secrets

      - name: Semgrep SAST (Python)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/owasp-top-ten
            p/secrets

  trivy-image:
    name: Trivy Image Scan (cv-python)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Build cv-python image
        run: docker build -t track-your-regions/cv-python:scan ./cv-python

      - name: Trivy scan (HIGH, CRITICAL)
        # Pinned to v0.36.0 commit SHA per GitHub Actions secure-use guidance
        # (avoid mutable @master / @v0.36.0 tag refs that can be repointed).
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: track-your-regions/cv-python:scan
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
